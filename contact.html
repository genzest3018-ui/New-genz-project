<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | GENZEST</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
            max-width: 800px;
        }
        .contact-card {
            background: linear-gradient(135deg, var(--bg-card-dark) 0%, transparent 100%);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }
        .contact-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }
        .contact-card i {
            font-size: 28px;
            color: var(--accent);
        }
        .contact-card h3 {
            font-size: 20px;
            font-weight: 700;
        }
        .contact-card p {
            font-size: 15px;
            color: var(--text-secondary-dark);
            word-break: break-all;
        }
    </style>
</head>
<body class="dark-theme">

    <header class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fa-solid fa-chart-line"></i>
                <span>GENZEST</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/about.html"><i class="fa-solid fa-circle-info"></i> About</a>
                <a href="/contact.html" class="active"><i class="fa-solid fa-envelope"></i> Contact</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="hero" style="padding-top: 80px; padding-bottom: 60px;">
            <div class="container">
                <a href="/" class="btn-secondary" style="padding: 10px 20px; font-size: 14px; margin-bottom: 32px; display: inline-flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>

                <span class="badge" style="display: block; width: max-content;">Support Hub</span>
                <h1 style="font-size: 40px; margin-bottom: 12px;">Get in Touch</h1>
                <p style="color: var(--text-secondary-dark); max-width: 500px;">Have questions, tool requests, or partnership inquiries? Reach out to our operational grid anytime.</p>
                
                <div class="contact-grid">
                    <a href="mailto:genzest3018@gmail.com" class="contact-card">
                        <i class="fa-solid fa-envelope-open-text"></i>
                        <div>
                            <h3>Drop an Email</h3>
                            <p>genzest3018@gmail.com</p>
                        </div>
                    </a>

                    <a href="tel:+918860327121" class="contact-card">
                        <i class="fa-solid fa-headset"></i>
                        <div>
                            <h3>Call Operations</h3>
                            <p>+91 88603 27121</p>
                        </div>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("genzest-theme") || "dark";
            document.body.className = `${savedTheme}-theme`;
        });
    </script>
</body>
</html>
