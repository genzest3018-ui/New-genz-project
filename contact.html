    <style>
        /* CONTACT SPECIFIC ENGINE ARCHITECTURE */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
            max-width: 800px;
        }
        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        /* Top Border Micro-Glow layer overlay */
        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        body.light-theme .contact-card::before,
        body.eyecare-theme .contact-card::before {
            background: linear-gradient(135deg, rgba(0,0,0,0.04), transparent 60%);
        }
        .contact-card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -12px rgba(99, 102, 241, 0.15);
        }
        body.eyecare-theme .contact-card:hover {
            box-shadow: 0 20px 40px -12px rgba(180, 83, 9, 0.18);
        }
        .contact-card i {
            font-size: 28px;
            color: var(--accent);
        }
        .contact-card h3 {
            font-size: 20px;
            font-weight: 700;
        }
        .contact-card p {
            font-size: 15px;
            color: var(--text-secondary-dark);
            word-break: break-all;
        }
    </style>
</head>
<body class="dark-theme">

                <span class="badge" style="display: block; width: max-content;">Support Hub</span>

                <p style="color: var(--text-secondary-dark); max-width: 500px;">Have questions, tool requests, or partnership inquiries? Reach out to our operational grid anytime.</p>
                
                <!-- Premium Communication Connectors -->
                <div class="contact-grid">
                    <a href="mailto:genzest3018@gmail.com" class="contact-card">
                        <i class="fa-solid fa-envelope-open-text"></i>
                        <div>
                            <h3>Drop an Email</h3>
                            <p>genzest3018@gmail.com</p>
                        </div>
                    </a>

                    <a href="tel:+918860327121" class="contact-card">
                        <i class="fa-solid fa-headset"></i>

                            <h3>Call Operations</h3>

    <!-- MULTI-THEME RETRIEVAL ENGINE -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("genzest-theme") || "dark";
            document.body.className = `${savedTheme}-theme`;
        });
    </script>
</body>
