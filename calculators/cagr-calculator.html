<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-25LP8VZBEV"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-25LP8VZBEV');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CAGR Calculator | GENZEST</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        /* EXTRA TOOL-SPECIFIC STYLE: Dashboard Architecture Setup */
        .tool-layout { 
            display: grid; 
            grid-template-columns: 1.1fr 0.9fr; 
            gap: 40px; 
            margin-top: 40px; 
        }
        .input-card, .result-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-dark); 
            border-radius: var(--radius-lg); 
            padding: 32px; 
            box-shadow: var(--card-shadow);
        }
        .result-card { 
            background: radial-gradient(circle at top right, var(--accent-glow), var(--bg-card)); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        .form-group { margin-bottom: 24px; }
        .form-label-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .input-wrapper-box { position: relative; display: flex; align-items: center; }
        .currency-symbol { position: absolute; left: 16px; font-weight: 700; color: var(--text-secondary-dark); }
        .tool-input { width: 100%; padding: 12px 16px 12px 36px; background: var(--bg-dark); border: 1px solid var(--border-dark); color: var(--text-primary-dark); border-radius: 8px; font-family: inherit; font-weight: 600; outline: none; }
        .tool-input.no-symbol { padding-left: 16px; }
        .range-slider { width: 100%; margin-top: 10px; accent-color: var(--accent); cursor: pointer; }
        .currency-select { padding: 6px 12px; background: var(--bg-dark); color: var(--text-primary-dark); border: 1px solid var(--border-dark); border-radius: 6px; font-weight: 600; cursor: pointer; outline: none; }
        .summary-item { border-bottom: 1px solid var(--border-dark); padding: 16px 0; }
        .summary-item:last-child { border-bottom: none; padding-bottom: 0; }
        .summary-label { font-size: 14px; color: var(--text-secondary-dark); margin-bottom: 4px; }
        .summary-value { font-size: 24px; font-weight: 800; }
        .summary-value.total-wealth { font-size: 34px; color: #10b981; }
        @media (max-width: 1024px) { .tool-layout { grid-template-columns: 1fr; gap: 24px; } }
    </style>
</head>
<body class="dark-theme">

    <header class="navbar">
        <div class="container">
            <div class="logo"><i class="fa-solid fa-chart-line"></i><span>GENZEST</span></div>
            <nav class="nav-menu">
                <a href="/"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/#calculators" class="active"><i class="fa-solid fa-calculator"></i> Calculators</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="hero" style="padding-top: 60px; padding-bottom: 40px;">
            <div class="container">
                <span class="badge"><i class="fa-solid fa-arrow-trend-up"></i> Growth Vector</span>
                <h1 style="font-size: 36px; margin-bottom: 8px;">CAGR Calculator</h1>
                <p style="color: var(--text-secondary-dark);">Compute the Compound Annual Growth Rate of your corporate or market portfolio values.</p>
                
                <div class="tool-layout">
                    <div class="input-card">
                        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-dark); padding-bottom: 16px;">
                            <span style="font-weight: 700;"><i class="fa-solid fa-earth-americas"></i> Currency Frame</span>
                            <select id="currency-switch" class="currency-select">
                                <option value="₹">INR (₹)</option>
                                <option value="$">USD ($)</option>
                                <option value="€">EUR (€)</option>
                                <option value="£">GBP (£)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <div class="form-label-flex"><label>Initial Principal Value</label><span id="label-init">10,000</span></div>
                            <div class="input-wrapper-box">
                                <span class="currency-symbol" id="symbol-1">₹</span>
                                <input type="number" id="input-init" class="tool-input" value="10000">
                            </div>
                            <input type="range" id="slider-init" class="range-slider" min="500" max="1000000" step="500" value="10000">
                        </div>
                        
                        <div class="form-group">
                            <div class="form-label-flex"><label>Target Maturity Value</label><span id="label-final">25,000</span></div>
                            <div class="input-wrapper-box">
                                <span class="currency-symbol" id="symbol-2">₹</span>
                                <input type="number" id="input-final" class="tool-input" value="25000">
                            </div>
                            <input type="range" id="slider-final" class="range-slider" min="1000" max="5000000" step="1000" value="25000">
                        </div>
                        
                        <div class="form-group">
                            <div class="form-label-flex"><label>Horizon Span (Years)</label><span><span id="label-years">5</span> Years</span></div>
                            <div class="input-wrapper-box"><input type="number" id="input-years" class="tool-input no-symbol" value="5"></div>
                            <input type="range" id="slider-years" class="range-slider" min="1" max="20" step="1" value="5">
                        </div>
                    </div>

                    <div class="result-card">
                        <div>
                            <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;"><i class="fa-solid fa-bolt"></i> Compounding Output</h3>
                            <div class="summary-item">
                                <div class="summary-label">Absolute Total Growth Absolute</div>
                                <div class="summary-value"><span id="res-gain">150</span>%</div>
                            </div>
                        </div>
                        <div class="summary-item" style="border: none; padding-top: 24px;">
                            <div class="summary-label" style="font-weight: 700; color: var(--text-primary-dark);">Compound Annual Growth Rate (CAGR)</div>
                            <div class="summary-value total-wealth"><span id="res-cagr">0</span>%</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("genzest-theme") || "dark";
            document.body.className = `${savedTheme}-theme`;
            
            const currencySwitch = document.getElementById("currency-switch");
            const initInput = document.getElementById("input-init"), initSlider = document.getElementById("slider-init");
            const finalInput = document.getElementById("input-final"), finalSlider = document.getElementById("slider-final");
            const yearsInput = document.getElementById("input-years"), yearsSlider = document.getElementById("slider-years");

            function sync(input, slider, labelId) {
                const label = document.getElementById(labelId);
                input.addEventListener("input", () => { slider.value = input.value; label.innerText = parseFloat(input.value || 0).toLocaleString(); calc(); });
                slider.addEventListener("input", () => { input.value = slider.value; label.innerText = parseFloat(slider.value).toLocaleString(); calc(); });
            }
            sync(initInput, initSlider, "label-init"); 
            sync(finalInput, finalSlider, "label-final"); 
            sync(yearsInput, yearsSlider, "label-years");

            currencySwitch.addEventListener("change", (e) => {
                document.getElementById("symbol-1").innerText = e.target.value;
                document.getElementById("symbol-2").innerText = e.target.value;
                calc();
            });

            function calc() {
                const initial = parseFloat(initInput.value) || 0;
                const finalVal = parseFloat(finalInput.value) || 0;
                const t = parseFloat(yearsInput.value) || 1;
                if(initial <= 0 || finalVal <= 0) return;
                
                // CAGR Standard Formula: (End/Start)^(1/t) - 1
                const cagr = (Math.pow((finalVal / initial), (1 / t)) - 1) * 100;
                const absoluteGain = ((finalVal - initial) / initial) * 100;
                
                document.getElementById("res-gain").innerText = absoluteGain.toFixed(2);
                document.getElementById("res-cagr").innerText = cagr.toFixed(2);
            }
            calc();
        });
    </script>
</body>
</html>
