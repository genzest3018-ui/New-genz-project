<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium SIP Calculator | GENZEST</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        /* EXTRA TOOL-SPECIFIC STYLE: Dashboard Architecture Setup */
        .tool-layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            margin-top: 40px;
        }
        .input-card, .result-card {
            background: linear-gradient(135deg, var(--bg-card-dark) 0%, transparent 100%);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 32px;
        }
        .result-card {
            background: radial-gradient(circle at top right, var(--accent-glow), transparent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .input-wrapper-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .currency-symbol {
            position: absolute;
            left: 16px;
            font-weight: 700;
            color: var(--text-secondary-dark);
        }
        .tool-input {
            width: 100%;
            padding: 12px 16px 12px 36px;
            background: var(--bg-dark);
            border: 1px solid var(--border-dark);
            color: var(--text-primary-dark);
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            outline: none;
        }
        .tool-input.no-symbol {
            padding-left: 16px;
        }
        .range-slider {
            width: 100%;
            margin-top: 10px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .currency-select {
            padding: 6px 12px;
            background: var(--bg-dark);
            color: var(--text-primary-dark);
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        .summary-item {
            border-bottom: 1px solid var(--border-dark);
            padding: 16px 0;
        }
        .summary-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .summary-label {
            font-size: 14px;
            color: var(--text-secondary-dark);
            margin-bottom: 4px;
        }
        .summary-value {
            font-size: 24px;
            font-weight: 800;
        }
        .summary-value.total-wealth {
            font-size: 32px;
            color: #10b981; /* Premium Wealth Green */
        }
        @media (max-width: 768px) {
            .tool-layout {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }
    </style>
</head>
<body class="dark-theme">

    <header class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fa-solid fa-chart-line"></i>
                <span>GENZEST</span>
            </div>
            <nav class="nav-menu">
                <a href="/"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/#calculators" class="active"><i class="fa-solid fa-calculator"></i> Calculators</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="hero" style="padding-top: 60px; padding-bottom: 40px;">
            <div class="container">
                <span class="badge"><i class="fa-solid fa-piggy-bank"></i> Investment Tool</span>
                <h1 style="font-size: 36px; margin-bottom: 8px;">SIP Calculator</h1>
                <p style="color: var(--text-secondary-dark);">Estimate the growth of your systematic investments over time with multi-currency tracking.</p>

                <div class="tool-layout">
                    
                    <div class="input-card">
                        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-dark); padding-bottom: 16px;">
                            <span style="font-weight: 700;"><i class="fa-solid fa-earth-americas"></i> Select Currency</span>
                            <select id="currency-switch" class="currency-select">
                                <option value="₹">INR (₹)</option>
                                <option value="$">USD ($)</option>
                                <option value="€">EUR (€)</option>
                                <option value="£">GBP (£)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <div class="form-label-flex">
                                <label>Monthly Investment</label>
                                <span id="label-monthly-amt">5,000</span>
                            </div>
                            <div class="input-wrapper-box">
                                <span class="currency-symbol" id="symbol-1">₹</span>
                                <input type="number" id="input-monthly-amt" class="tool-input" value="5000">
                            </div>
                            <input type="range" id="slider-monthly-amt" class="range-slider" min="500" max="100000" step="500" value="5000">
                        </div>

                        <div class="form-group">
                            <div class="form-label-flex">
                                <label>Expected Return Rate (p.a.)</label>
                                <span><span id="label-return-rate">12</span>%</span>
                            </div>
                            <div class="input-wrapper-box">
                                <input type="number" id="input-return-rate" class="tool-input no-symbol" value="12" step="0.1">
                            </div>
                            <input type="range" id="slider-return-rate" class="range-slider" min="1" max="30" step="0.5" value="12">
                        </div>

                        <div class="form-group">
                            <div class="form-label-flex">
                                <label>Time Period</label>
                                <span><span id="label-years">10</span> Yr</span>
                            </div>
                            <div class="input-wrapper-box">
                                <input type="number" id="input-years" class="tool-input no-symbol" value="10">
                            </div>
                            <input type="range" id="slider-years" class="range-slider" min="1" max="40" step="1" value="10">
                        </div>
                    </div>

                    <div class="result-card">
                        <div>
                            <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;"><i class="fa-solid fa-chart-pie"></i> Projections Summary</h3>
                            
                            <div class="summary-item">
                                <div class="summary-label">Invested Amount</div>
                                <div class="summary-value"><span class="curr-render">₹</span><span id="res-invested">0</span></div>
                            </div>

                            <div class="summary-item">
                                <div class="summary-label">Est. Returns Generated</div>
                                <div class="summary-value" style="color: var(--accent);"><span class="curr-render">₹</span><span id="res-returns">0</span></div>
                            </div>
                        </div>

                        <div class="summary-item" style="border: none; padding-top: 24px;">
                            <div class="summary-label" style="font-weight: 700;">Total Wealth Value</div>
                            <div class="summary-value total-wealth"><span class="curr-render">₹</span><span id="res-total">0</span></div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("genzest-theme") || "dark";
            document.body.className = `${savedTheme}-theme`;

            const currencySwitch = document.getElementById("currency-switch");
            const amtInput = document.getElementById("input-monthly-amt"), amtSlider = document.getElementById("slider-monthly-amt");
            const rateInput = document.getElementById("input-return-rate"), rateSlider = document.getElementById("slider-return-rate");
            const yearsInput = document.getElementById("input-years"), yearsSlider = document.getElementById("slider-years");

            function sync(input, slider, labelId) {
                const label = document.getElementById(labelId);
                input.addEventListener("input", () => {
                    slider.value = input.value;
                    label.innerText = parseFloat(input.value || 0).toLocaleString();
                    calc();
                });
                slider.addEventListener("input", () => {
                    input.value = slider.value;
                    label.innerText = parseFloat(slider.value).toLocaleString();
                    calc();
                });
            }
            sync(amtInput, amtSlider, "label-monthly-amt");
            sync(rateInput, rateSlider, "label-return-rate");
            sync(yearsInput, yearsSlider, "label-years");

            currencySwitch.addEventListener("change", (e) => {
                document.getElementById("symbol-1").innerText = e.target.value;
                document.querySelectorAll(".curr-render").forEach(s => s.innerText = e.target.value);
                calc();
            });

            function calc() {
                const P = parseFloat(amtInput.value) || 0;
                const i = (parseFloat(rateInput.value) || 0) / 12 / 100;
                const n = (parseFloat(yearsInput.value) || 0) * 12;

                let totalWealth = 0;
                if (i > 0) {
                    totalWealth = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
                } else {
                    totalWealth = P * n;
                }

                const invested = P * n;
                const returns = totalWealth - invested;

                document.getElementById("res-invested").innerText = Math.round(invested).toLocaleString();
                document.getElementById("res-returns").innerText = Math.round(returns > 0 ? returns : 0).toLocaleString();
                document.getElementById("res-total").innerText = Math.round(totalWealth).toLocaleString();
            }
            calc();
        });
    </script>
</body>
</html>
